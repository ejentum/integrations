name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files parse
        run: |
          fail=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            else
              echo "OK: $f"
            fi
          done
          exit $fail

  validate-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          fail=0
          for f in $(find ./claude-code/skills -name "SKILL.md" 2>/dev/null); do
            # Check first line is ---
            first=$(head -1 "$f")
            if [ "$first" != "---" ]; then
              echo "::error file=$f::Missing frontmatter opening ---"
              fail=1
              continue
            fi
            # Check for required keys
            if ! grep -q "^name:" "$f"; then
              echo "::error file=$f::Missing name: field in frontmatter"
              fail=1
            fi
            if ! grep -q "^description:" "$f"; then
              echo "::error file=$f::Missing description: field in frontmatter"
              fail=1
            fi
            echo "OK: $f"
          done
          exit $fail

  check-broken-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken relative links in READMEs
        run: |
          fail=0
          for readme in $(find . -name "README.md" -not -path "./.git/*"); do
            dir=$(dirname "$readme")
            # Extract markdown links to relative paths (starting with ./)
            grep -oE '\]\(\.\/[^)]+\)' "$readme" | while read link; do
              path=$(echo "$link" | sed 's/](\.\///' | sed 's/)//')
              full="$dir/$path"
              if [ ! -e "$full" ]; then
                echo "::error file=$readme::Broken link: $path"
                fail=1
              fi
            done
          done
          exit $fail
